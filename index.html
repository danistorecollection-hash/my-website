<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fintech Landing Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0f;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
}

.logo{
display:flex;
align-items:center;
}

.logo img{
height:80px;
width:auto;
display:block;
}

nav a{
color:white;
text-decoration:none;
margin-left:30px;
}

.hero{
min-height:90vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 8%;
gap:50px;
}

.hero-text{
max-width:550px;
}

.hero-text h1{
font-size:60px;
line-height:1.1;
margin-bottom:20px;
}

.hero-text p{
color:#bdbdbd;
font-size:18px;
line-height:1.7;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:16px 35px;
background:white;
color:black;
text-decoration:none;
border-radius:14px;
font-weight:700;
}

.hero-image img{
width:100%;
max-width:500px;
border-radius:25px;
}

@media(max-width:900px){

header{
flex-direction:column;
gap:15px;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

nav a{
margin-left:0;
font-size:13px;
}

.hero{
flex-direction:column;
text-align:center;
}

.hero-image{
margin-top:90px;
}

}
.hero{
flex-direction:column;
padding-top:10px;
text-align:center;
}

.hero-text h1{
font-size:42px;
}

.hero-image{
position:relative;
width:380px;
margin:auto;
}

.hero-image img{
width:100%;
height:500px;
object-fit:cover;
border-radius:30px;
}

.bank-widget{
position:absolute;
top:355px;
left:50%;
transform:translateX(-50%);
width:85%;
background:rgba(255,255,255,.95);
border-radius:22px;
padding:18px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.balance-label{
font-size:12px;
color:#666;
display:block;
margin-bottom:5px;
}

.balance h2{
font-size:32px;
color:black;
margin-bottom:15px;
}

.actions{
display:flex;
gap:10px;
}

.action-btn{
flex:1;
background:black;
color:white;
border:none;
border-radius:14px;
padding:12px;
font-weight:700;
cursor:pointer;
}
footer{
margin-top:100px;
padding:40px 20px;
text-align:center;
border-top:1px solid rgba(255,255,255,.08);
}

.footer-links{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
margin-bottom:20px;
}

.footer-links a{
color:#9ca3af;
text-decoration:none;
font-size:14px;
transition:.3s;
}

.footer-links a:hover{
color:white;
}

footer p{
color:#6b7280;
font-size:13px;
}
.hero{
flex-direction:column;
text-align:center;
gap:0;
padding-bottom:0;
}

.hero-image{
margin:0 auto;
}

footer{
margin-top:0;
}

</style>
</head>
<body>

<header>

<div class="logo">
<img src="logo.png" alt="Logo">
</div>

<nav>
<a href="#">Home</a>
<a href="#">Benefits</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<div class="hero-text">

<h1>
Modern Finance For Everyone
</h1>

<p>
Simple, secure and fast online application experience designed for users across Bulgaria.
</p>

<a href="#" class="btn">
Apply Now
</a>

</div>

<div class="hero-image">

    <img src="girl.jpg" alt="Hero Image">

    <div class="bank-widget">

        <div class="balance">
            <span class="balance-label">Balance</span>
            <h2>€3056</h2>
        </div>

        <div class="actions">

            <button class="action-btn">
                Add Money
            </button>

            <button class="action-btn">
                Transfer
            </button>

        </div>

    </div>

</div>

</div>

</section>
<footer>

<div class="footer-links">

<a href="#">Contact</a>

<a href="#">Privacy Policy</a>

<a href="#">Terms & Conditions</a>

<a href="#">About Us</a>

</div>

<p>
© 2026 All Rights Reserved
</p>

</footer>
</body>
